services:
  mysql:
    image: mysql:8.4
    container_name: lifepilot-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lifepilot}
      MYSQL_USER: ${MYSQL_USER:-lifepilot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lifepilot_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lifepilot_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - lifepilot-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lifepilot-mysql-data:

